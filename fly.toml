# fly.toml app configuration file generated for agentboard on 2026-04-08T14:46:17+04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'agentboard'
primary_region = 'fra'

[build]

[env]
  AGENT_AUTH_ENABLED = '0'
  NODE_ENV = 'production'
  PORT = '3456'
  PUBLIC_BASE_URL = 'https://agentboard.fly.dev'
  X402_ENABLED = '0'

[[mounts]]
  source = 'agentboard_data'
  destination = '/app/web-server/data'

[http_service]
  internal_port = 3456
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
